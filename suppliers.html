<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Suppliers – COSTruct</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,700&display=swap" rel="stylesheet">
<style>
:root{--g900:#052016;--g800:#0a3d2b;--g700:#0d4f37;--g600:#0f5a3f;--g400:#1a8a5e;--g200:#a8dfc7;--g100:#d4f0e3;--g50:#edf8f3;--ink:#111816;--ink2:#3a4a42;--ink3:#6b7a72;--bg:#f2f5f3;--card:#fff;--border:#dde8e2;--red:#dc3545;--shadow:0 4px 20px rgba(10,61,43,0.09);--r:12px;--r-lg:18px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--ink);overflow-x:hidden}
nav{position:fixed;top:0;left:0;right:0;z-index:500;background:rgba(5,32,22,0.96);backdrop-filter:blur(12px);padding:0 32px;height:64px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid rgba(255,255,255,0.07)}
.logo{font-family:'Fraunces',serif;font-size:22px;font-weight:700;color:#fff}
.logo span{color:var(--g200)}
nav ul{display:flex;gap:28px;list-style:none}
nav ul a{text-decoration:none;font-size:14px;font-weight:500;color:rgba(255,255,255,0.65);transition:.2s}
nav ul a:hover,nav ul a.active{color:#fff}
.nav-right{display:flex;align-items:center;gap:12px}
.login-btn{padding:8px 20px;background:var(--g600);color:#fff;border-radius:8px;text-decoration:none;font-size:14px;font-weight:600;transition:.2s;border:1px solid rgba(255,255,255,0.15)}
.login-btn:hover{background:var(--g400)}
.burger{display:none;flex-direction:column;gap:5px;cursor:pointer;padding:6px;background:none;border:none}
.burger span{display:block;width:22px;height:2px;background:rgba(255,255,255,0.8);border-radius:2px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,0.55);z-index:600;backdrop-filter:blur(3px)}
.overlay.on{display:block}
.sidebar{position:fixed;top:0;right:-340px;width:320px;height:100vh;background:var(--card);z-index:700;transition:right .35s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column;box-shadow:0 12px 40px rgba(10,61,43,0.13)}
.sidebar.on{right:0}
.sb-head{background:var(--g800);padding:28px 22px 22px;position:relative}
.sb-avatar{width:48px;height:48px;border-radius:12px;background:var(--g600);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:700;color:#fff;margin-bottom:12px}
.sb-name{color:#fff;font-size:16px;font-weight:600}
.sb-email{color:rgba(255,255,255,0.6);font-size:13px;margin-top:2px}
.sb-close{position:absolute;top:16px;right:16px;background:rgba(255,255,255,0.1);border:none;color:#fff;width:32px;height:32px;border-radius:8px;cursor:pointer;font-size:18px;display:flex;align-items:center;justify-content:center}
.sb-menu{padding:12px 0;flex:1;overflow-y:auto}
.sb-item{display:flex;align-items:center;gap:14px;padding:13px 22px;text-decoration:none;color:var(--ink2);font-size:14px;font-weight:500;transition:.2s;border-left:3px solid transparent;cursor:pointer}
.sb-item:hover{background:var(--g50);border-left-color:var(--g600);color:var(--g800)}
.sb-item .ico{width:22px;text-align:center;font-size:17px}
.sb-foot{padding:16px 22px;border-top:1px solid var(--border)}
.logout-btn{width:100%;padding:11px;background:var(--red);color:#fff;border:none;border-radius:var(--r);font-size:14px;font-weight:600;cursor:pointer}
.hero{background:var(--g900);padding:100px 24px 56px;text-align:center;position:relative;overflow:hidden}
.hero::after{content:'';position:absolute;bottom:-1px;left:0;right:0;height:60px;background:var(--bg);clip-path:ellipse(55% 100% at 50% 100%)}
.hero-grid{position:absolute;inset:0;background-image:linear-gradient(rgba(255,255,255,0.03) 1px,transparent 1px),linear-gradient(90deg,rgba(255,255,255,0.03) 1px,transparent 1px);background-size:48px 48px;pointer-events:none}
.hero h1{font-family:'Fraunces',serif;font-size:clamp(28px,5vw,48px);font-weight:700;color:#fff;position:relative;z-index:1;letter-spacing:-1px;margin-bottom:10px}
.hero p{font-size:15px;color:rgba(255,255,255,0.55);position:relative;z-index:1;max-width:480px;margin:0 auto}
.container{max-width:1100px;margin:0 auto;padding:0 20px 60px}
.search-box{background:var(--card);border-radius:var(--r-lg);border:1px solid var(--border);padding:20px;margin-bottom:28px;box-shadow:var(--shadow)}
.search-row{display:grid;grid-template-columns:1fr auto auto;gap:10px;align-items:center}
.search-wrap{position:relative}
.search-icon{position:absolute;left:12px;top:50%;transform:translateY(-50%);color:var(--ink3);font-size:15px;pointer-events:none}
.search-wrap input{width:100%;padding:11px 12px 11px 36px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:14px;color:var(--ink);background:var(--bg);outline:none;transition:.2s}
.search-wrap input:focus{border-color:var(--g600);background:#fff}
select{padding:11px 12px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:13px;color:var(--ink2);background:var(--bg);cursor:pointer;outline:none;transition:.2s;min-width:120px}
select:focus{border-color:var(--g600)}
.chips{display:flex;gap:8px;flex-wrap:wrap;margin-top:12px}
.chip{padding:5px 13px;border:1.5px solid var(--border);border-radius:100px;font-size:12px;font-weight:600;cursor:pointer;color:var(--ink3);background:var(--bg);transition:.2s;white-space:nowrap}
.chip.on{background:var(--g50);border-color:var(--g600);color:var(--g700)}
.results-bar{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px}
.results-bar p{font-size:13px;color:var(--ink3)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(290px,1fr));gap:16px}
.scard{background:var(--card);border-radius:var(--r-lg);border:1px solid var(--border);overflow:hidden;display:flex;flex-direction:column;transition:.3s;cursor:pointer}
.scard:hover{border-color:var(--g200);box-shadow:var(--shadow);transform:translateY(-2px)}
.scard-top{padding:20px 20px 16px;display:flex;align-items:flex-start;gap:14px}
.scard-avatar{width:46px;height:46px;border-radius:12px;background:var(--g50);display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700;color:var(--g700);flex-shrink:0;border:1px solid var(--g100);letter-spacing:.5px}
.scard-name{font-size:15px;font-weight:700;color:var(--ink);margin-bottom:4px;line-height:1.3}
.badge{display:inline-block;padding:3px 9px;border-radius:100px;font-size:11px;font-weight:700;background:var(--g50);color:var(--g700);letter-spacing:.3px}
.scard-info{padding:0 20px 14px;display:flex;align-items:center;gap:6px;font-size:13px;color:var(--ink3)}
.scard-desc{padding:0 20px 16px;font-size:13px;color:var(--ink3);line-height:1.55;flex-grow:1}
.scard-foot{border-top:1px solid var(--border);padding:14px 20px;display:flex;justify-content:flex-end}
.view-btn{padding:8px 18px;font-size:13px;font-weight:600;color:var(--g700);background:var(--g50);border:1.5px solid var(--g200);border-radius:8px;cursor:pointer;text-decoration:none;transition:.2s}
.view-btn:hover{background:var(--g800);color:#fff;border-color:var(--g800)}
.empty{grid-column:1/-1;text-align:center;padding:60px 20px}
.empty-icon{font-size:36px;margin-bottom:12px}
.empty h3{font-size:16px;font-weight:700;color:var(--ink);margin-bottom:6px}
.empty p{font-size:13px;color:var(--ink3)}
.loading{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--ink3);font-size:14px}
.spinner{display:inline-block;width:28px;height:28px;border:3px solid var(--g100);border-top-color:var(--g600);border-radius:50%;animation:spin .8s linear infinite;margin-bottom:12px}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:768px){
  nav ul{display:none}.login-btn{display:none}.burger{display:flex}
  .search-row{grid-template-columns:1fr}
  .grid{grid-template-columns:1fr}
}
</style>
</head>
<body>
<nav>
  <div class="logo">CO<span>S</span>Truct</div>
  <ul>
    <li><a href="index.html">Home</a></li>
    <li><a href="estimation.html">Estimation</a></li>
    <li><a href="suppliers.html" class="active">Suppliers</a></li>
  </ul>
  <div class="nav-right">
    <a href="login.html" class="login-btn" id="loginBtn">Login</a>
    <button class="burger" id="burgerBtn" onclick="toggleSidebar()" style="display:none">
      <span></span><span></span><span></span>
    </button>
  </div>
</nav>
<div class="overlay" id="overlay" onclick="toggleSidebar()"></div>
<div class="sidebar" id="sidebar">
  <div class="sb-head">
    <button class="sb-close" onclick="toggleSidebar()">&times;</button>
    <div class="sb-avatar">U</div>
    <div class="sb-name" id="sbName">User Name</div>
    <div class="sb-email" id="sbEmail">user@example.com</div>
  </div>
  <div class="sb-menu">
    <div class="sb-item">Profile</div>
    <div class="sb-item">Settings</div>
    <div class="sb-item" onclick="location.href='index.html#about'">About</div>
    <div class="sb-item" id="adminItem" style="display:none" onclick="location.href='admin.html'">Admin Dashboard</div>
  </div>
  <div class="sb-foot"><button class="logout-btn" onclick="doLogout()">Logout</button></div>
</div>
<div class="hero">
  <div class="hero-grid"></div>
  <h1>Supplier Directory</h1>
  <p>Find trusted construction material suppliers in the Partido Area</p>
</div>
<div class="container">
  <div class="search-box">
    <div class="search-row">
      <div class="search-wrap">
        <span class="search-icon"></span>
        <input type="text" id="searchInput" placeholder="Search supplier name or location..." oninput="doFilter()">
      </div>
      <select id="locSel" onchange="doFilter()">
        <option value="all">All locations</option>
        <option value="Tigaon">Tigaon</option>
        <option value="Goa">Goa</option>
        <option value="San Jose">San Jose</option>
        <option value="Lagonoy">Lagonoy</option>
        <option value="Sagnay">Sagnay</option>
      </select>
    </div>
  </div>
  <div class="results-bar"><p id="resultCount"></p></div>
  <div class="grid" id="grid">
    <div class="loading"><div class="spinner"></div><div>Loading suppliers...</div></div>
  </div>
</div>

<!-- Supabase JS v2 -->
<script type="module">
  import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

  // ====== CONFIGURE THESE ======
  const SUPABASE_URL = 'https://YOUR-PROJECT-REF.supabase.co';
  const SUPABASE_ANON_KEY = 'YOUR-ANON-PUBLIC-KEY';
  // =============================

  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const ICONS = { hardware:'HW', lumber:'LB', construction:'GC', cement:'CA' };

  let allSuppliers = [];
  let currentUser = null;

  // ---- Data access ----
  async function loadAll() {
    const { data, error } = await supabase
      .from('suppliers')
      .select('id, email, name, owner_name, category, location, contact, address, description, since, delivery, rating, created_at')
      .order('created_at', { ascending: false });

    if (error) {
      console.error('Error loading suppliers:', error);
      return [];
    }
    return data || [];
  }

  // ---- Filtering / rendering ----
  function doFilter() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    const loc = document.getElementById('locSel').value;
    const filtered = allSuppliers.filter(s => {
      const mq = !q || (s.name || '').toLowerCase().includes(q) || (s.location || '').toLowerCase().includes(q);
      const ml = loc === 'all' || s.location === loc;
      return mq && ml;
    });
    renderGrid(filtered, true);
    const c = document.getElementById('resultCount');
    c.textContent = filtered.length === allSuppliers.length
      ? `Showing all ${allSuppliers.length} suppliers`
      : `${filtered.length} of ${allSuppliers.length} suppliers`;
  }

  function renderGrid(list, isFiltered) {
    const g = document.getElementById('grid');
    if (!list.length) {
      g.innerHTML = isFiltered
        ? `<div class="empty"><div class="empty-icon"></div><h3>No suppliers found</h3><p>Try adjusting your search or filters.</p></div>`
        : `<div class="empty"><div class="empty-icon"></div><h3>No suppliers yet</h3><p>No registered suppliers found. Suppliers can sign up through the registration page.</p></div>`;
      return;
    }
    g.innerHTML = list.map(s => {
      const icon = ICONS[s.category] || '';
      const cat = (s.category || '').charAt(0).toUpperCase() + (s.category || '').slice(1);
      const desc = s.description || 'Authorized supplier for construction materials.';
      return `<div class="scard">
        <div class="scard-top">
          <div class="scard-avatar">${icon}</div>
          <div><div class="scard-name">${escapeHtml(s.name)}</div><span class="badge">${escapeHtml(cat)}</span></div>
        </div>
        <div class="scard-info"><span style="font-size:11px;background:var(--g50);border:1px solid var(--g100);border-radius:4px;padding:1px 6px;font-weight:700;color:var(--g700);letter-spacing:.3px">LOC</span> ${escapeHtml(s.location || '')}</div>
        <div class="scard-desc">${escapeHtml(desc)}</div>
        <div class="scard-foot"><a href="catalog.html?email=${encodeURIComponent(s.email)}" class="view-btn">View catalog →</a></div>
      </div>`;
    }).join('');
  }

  function escapeHtml(str) {
    return String(str ?? '').replace(/[&<>"']/g, c => ({
      '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'
    }[c]));
  }

  // ---- Auth / session ----
  async function loadCurrentUser() {
    const { data: { session } } = await supabase.auth.getSession();
    if (!session) return null;

    const user = session.user;
    // Pull profile from `profiles` table (name, role). Falls back to metadata.
    const { data: profile } = await supabase
      .from('profiles')
      .select('name, role')
      .eq('id', user.id)
      .maybeSingle();

    return {
      id: user.id,
      email: user.email,
      name: profile?.name || user.user_metadata?.name || user.email,
      role: profile?.role || user.user_metadata?.role || 'buyer'
    };
  }

  async function doLogout() {
    if (!confirm('Logout?')) return;
    await supabase.auth.signOut();
    location.href = 'index.html';
  }

  function toggleSidebar() {
    document.getElementById('sidebar').classList.toggle('on');
    document.getElementById('overlay').classList.toggle('on');
  }

  // ---- Init ----
  async function init() {
    // 1. Session / user UI
    currentUser = await loadCurrentUser();
    if (currentUser) {
      document.getElementById('loginBtn').style.display = 'none';
      document.getElementById('burgerBtn').style.display = 'flex';
      document.getElementById('sbName').textContent = currentUser.name;
      document.getElementById('sbEmail').textContent = currentUser.email;
      document.querySelector('.sb-avatar').textContent = (currentUser.name || 'U').charAt(0).toUpperCase();
      if (currentUser.role === 'supplier') {
        document.getElementById('adminItem').style.display = 'flex';
      }
    }

    // 2. Suppliers list
    allSuppliers = await loadAll();
    document.getElementById('resultCount').textContent =
      allSuppliers.length ? `Showing all ${allSuppliers.length} suppliers` : '';
    renderGrid(allSuppliers, false);

    // 3. Live updates when suppliers register / update
    supabase
      .channel('suppliers-changes')
      .on('postgres_changes', { event: '*', schema: 'public', table: 'suppliers' }, async () => {
        allSuppliers = await loadAll();
        doFilter();
      })
      .subscribe();
  }

  // Expose for inline onclick handlers
  window.toggleSidebar = toggleSidebar;
  window.doLogout = doLogout;
  window.doFilter = doFilter;

  init();
</script>
</body>
</html>
