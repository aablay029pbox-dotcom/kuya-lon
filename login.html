<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – COSTruct</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,700&display=swap" rel="stylesheet">

<style>
:root{--g900:#052016;--g800:#0a3d2b;--g600:#0f5a3f;--g400:#1a8a5e;--g200:#a8dfc7;--g50:#edf8f3;--ink:#111816;--ink3:#6b7a72;--bg:#f2f5f3;--border:#dde8e2}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);display:flex;justify-content:center;align-items:center;min-height:100vh;padding:20px}
.wrap{display:grid;grid-template-columns:1fr 1.4fr;max-width:920px;width:100%;background:#fff;border-radius:24px;overflow:hidden}

.left{background:var(--g900);padding:50px;color:#fff}
.right{padding:50px}

.form-panel{display:none}
.form-panel.active{display:block}

.field{margin-bottom:14px}
.field input{width:100%;padding:12px;border:1px solid var(--border);border-radius:8px}

.submit-btn{width:100%;padding:14px;background:var(--g800);color:#fff;border:none;border-radius:8px;cursor:pointer}

.role-row{display:flex;gap:10px;margin-bottom:15px}
.role-opt label{padding:8px 12px;border:1px solid var(--border);border-radius:8px;cursor:pointer}

.alert{display:none;padding:10px;margin-bottom:10px;border-radius:8px}

@media(max-width:680px){.wrap{grid-template-columns:1fr}}
</style>
</head>

<body>

<div class="wrap">

<div class="left">
  <h2>COSTruct</h2>
  <p>Smart Construction Estimation System</p>
</div>

<div class="right">

<!-- LOGIN -->
<div class="form-panel active" id="panelLogin">
<h2>Login</h2>
<div class="alert" id="loginAlert"></div>

<form onsubmit="doLogin(event)">
<div class="role-row">
  <div class="role-opt">
    <input type="radio" name="loginRole" value="buyer" checked> Buyer
  </div>
  <div class="role-opt">
    <input type="radio" name="loginRole" value="supplier"> Supplier
  </div>
</div>

<div class="field"><input id="loginEmail" placeholder="Email"></div>
<div class="field"><input id="loginPw" type="password" placeholder="Password"></div>

<button class="submit-btn">Login</button>
</form>
</div>

<!-- REGISTER -->
<div class="form-panel" id="panelReg">
<h2>Register</h2>
<div class="alert" id="regAlert"></div>

<form onsubmit="doRegister(event)">
<div class="role-row">
  <div class="role-opt">
    <input type="radio" name="role" value="buyer" checked onchange="toggleSup()"> Buyer
  </div>
  <div class="role-opt">
    <input type="radio" name="role" value="supplier" onchange="toggleSup()"> Supplier
  </div>
</div>

<div class="field"><input id="regName" placeholder="Name"></div>
<div class="field"><input id="regEmail" placeholder="Email"></div>
<div class="field"><input id="regContact" placeholder="Contact"></div>
<div class="field"><input id="regAddress" placeholder="Address"></div>
<div class="field"><input id="regPw" type="password" placeholder="Password"></div>
<div class="field"><input id="regPwConfirm" type="password" placeholder="Confirm"></div>

<div id="supFields" style="display:none">
  <div class="field"><input id="storeName" placeholder="Business Name"></div>
</div>

<button class="submit-btn">Create Account</button>
</form>

</div>

</div>
</div>

<script type="module">
import { supabase } from './supabase-client.js';

function showAlert(id,msg,type){
const el=document.getElementById(id);
el.textContent=msg;
el.className='alert';
el.style.display='block';
setTimeout(()=>el.style.display='none',3000);
}

function toggleSup(){
const role=document.querySelector('input[name="role"]:checked').value;
document.getElementById('supFields').style.display=role==='supplier'?'block':'none';
}

// LOGIN
async function doLogin(e){
e.preventDefault();

const email=document.getElementById('loginEmail').value;
const pw=document.getElementById('loginPw').value;
const expected=document.querySelector('input[name="loginRole"]:checked').value;

const {data,error}=await supabase.auth.signInWithPassword({email,password:pw});
if(error) return showAlert('loginAlert',error.message,'error');

const role=data.user?.user_metadata?.role || 'buyer';

if(role!==expected){
await supabase.auth.signOut();
return showAlert('loginAlert','Role mismatch','error');
}

location.href=role==='supplier'?'admin.html':'index.html';
}

// REGISTER (TRIGGER HANDLES DATABASE)
async function doRegister(e){
e.preventDefault();

const name=document.getElementById('regName').value;
const email=document.getElementById('regEmail').value;
const pw=document.getElementById('regPw').value;
const pw2=document.getElementById('regPwConfirm').value;
const role=document.querySelector('input[name="role"]:checked').value;

if(pw!==pw2) return showAlert('regAlert','Password mismatch','error');

await supabase.auth.signUp({
email,
password:pw,
options:{
data:{
name,
role,
storeName:document.getElementById('storeName')?.value || null,
category:null,
location:null
}
}
});

showAlert('regAlert','Account created! Check email if required','success');
setTimeout(()=>switchPanel('panelLogin'),1500);
}

function switchPanel(id){
document.querySelectorAll('.form-panel').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

window.switchPanel=switchPanel;
window.doLogin=doLogin;
window.doRegister=doRegister;
window.toggleSup=toggleSup;
</script>

</body>
</html>
