<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – COSTruct</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,700&display=swap" rel="stylesheet">

<style>
:root{--g900:#052016;--g800:#0a3d2b;--g600:#0f5a3f;--g400:#1a8a5e;--g200:#a8dfc7;--g100:#d4f0e3;--g50:#edf8f3;--ink:#111816;--ink2:#3a4a42;--ink3:#6b7a72;--bg:#f2f5f3;--border:#dde8e2;--red:#dc3545}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.wrap{display:grid;grid-template-columns:1fr 1.4fr;max-width:920px;width:100%;background:#fff;border-radius:24px;overflow:hidden;box-shadow:0 20px 60px rgba(10,61,43,0.14)}

/* LEFT PANEL */
.left{background:var(--g900);padding:52px 44px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
.left-bg{position:absolute;bottom:-60px;right:-60px;width:280px;height:280px;border-radius:50%;background:rgba(15,90,63,0.35);pointer-events:none}
.left-bg2{position:absolute;top:-40px;left:-40px;width:180px;height:180px;border-radius:50%;background:rgba(15,90,63,0.2);pointer-events:none}
.logo{font-family:'Fraunces',serif;font-size:26px;font-weight:700;color:#fff;position:relative;z-index:1}
.logo span{color:var(--g200)}
.left-mid{position:relative;z-index:1}
.left h2{font-family:'Fraunces',serif;font-size:clamp(24px,3vw,32px);color:#fff;font-weight:700;line-height:1.2;margin-bottom:14px;letter-spacing:-0.5px}
.left h2 em{font-style:normal;color:var(--g200)}
.left p{font-size:14px;color:rgba(255,255,255,0.55);line-height:1.65}
.left-foot{position:relative;z-index:1}
.left-foot a{color:var(--g200);font-size:13px;text-decoration:none}

/* RIGHT PANEL */
.right{padding:48px 44px;display:flex;flex-direction:column;justify-content:center}
.form-panel{display:none}
.form-panel.active{display:block}
.form-title{font-family:'Fraunces',serif;font-size:26px;font-weight:700;color:var(--g900);margin-bottom:6px}
.form-sub{font-size:14px;color:var(--ink3);margin-bottom:28px}
.alert{padding:11px 14px;border-radius:10px;font-size:13px;font-weight:500;margin-bottom:18px;display:none}
.alert.success{background:#d4edda;color:#155724;border:1px solid #c3e6cb}
.alert.error{background:#fde8e8;color:#7b2424;border:1px solid #f5c6cb}

/* ROLE */
.role-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.role-opt input{display:none}
.role-opt label{display:flex;align-items:center;justify-content:center;padding:11px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;color:var(--ink3)}
.role-opt input:checked + label{border-color:var(--g600);background:var(--g50);color:var(--g800)}

/* INPUTS */
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--ink3);margin-bottom:6px;text-transform:uppercase}
.field input,.field select{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px}
.field input:focus,.field select:focus{border-color:var(--g600);box-shadow:0 0 0 3px rgba(15,90,63,0.1)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}

.supplier-fields{border:1.5px solid var(--border);border-radius:12px;padding:16px;background:var(--bg);margin-bottom:16px}
.supplier-fields-label{font-size:12px;font-weight:700;margin-bottom:12px;color:var(--ink3);text-transform:uppercase}

.submit-btn{width:100%;padding:14px;background:var(--g800);color:#fff;border:none;border-radius:10px;font-size:16px;font-weight:700;cursor:pointer}
.submit-btn:hover{background:var(--g600)}

.switch-txt{text-align:center;font-size:14px;margin-top:18px;color:var(--ink3)}
.switch-txt a{color:var(--g600);font-weight:600;text-decoration:none}

@media(max-width:680px){
.wrap{grid-template-columns:1fr}
.left{padding:36px 28px}
.right{padding:36px 28px}
}
</style>
</head>

<body>
<div class="wrap">

  <!-- LEFT -->
  <div class="left">
    <div class="left-bg"></div>
    <div class="left-bg2"></div>

    <div class="logo">CO<span>S</span>Truct</div>

    <div class="left-mid">
      <h2>Plan Fast.<br>Build <em>Smart.</em></h2>
      <h2>Save More.</h2>
      <p>Real-time material quantity and cost estimation for construction projects.</p>
    </div>

    <div class="left-foot">
      <a href="index.html">← Back to homepage</a>
    </div>
  </div>

  <!-- RIGHT -->
  <div class="right">

    <!-- LOGIN -->
    <div class="form-panel active" id="panelLogin">
      <h2 class="form-title">Welcome back</h2>
      <p class="form-sub">Sign in to continue</p>

      <div class="alert" id="loginAlert"></div>

      <form onsubmit="doLogin(event)">
        <div class="role-row">
          <div class="role-opt">
            <input type="radio" id="lrBuyer" name="loginRole" value="buyer" checked>
            <label for="lrBuyer">Buyer</label>
          </div>
          <div class="role-opt">
            <input type="radio" id="lrSupplier" name="loginRole" value="supplier">
            <label for="lrSupplier">Supplier</label>
          </div>
        </div>

        <div class="field">
          <label>Email</label>
          <input type="email" id="loginEmail" required>
        </div>

        <div class="field">
          <label>Password</label>
          <input type="password" id="loginPw" required>
        </div>

        <button class="submit-btn">Sign In</button>

        <p class="switch-txt">
          No account? <a href="#" onclick="switchPanel('panelReg')">Register</a>
        </p>
      </form>
    </div>

    <!-- REGISTER -->
    <div class="form-panel" id="panelReg">
      <h2 class="form-title">Create account</h2>
      <p class="form-sub">Choose role</p>

      <div class="alert" id="regAlert"></div>

      <form onsubmit="doRegister(event)">

        <div class="role-row">
          <div class="role-opt">
            <input type="radio" id="rrBuyer" name="role" value="buyer" checked onchange="toggleSupFields()">
            <label for="rrBuyer">Buyer</label>
          </div>
          <div class="role-opt">
            <input type="radio" id="rrSupplier" name="role" value="supplier" onchange="toggleSupFields()">
            <label for="rrSupplier">Supplier</label>
          </div>
        </div>

        <div class="field"><label>Name</label><input id="regName" required></div>
        <div class="field"><label>Email</label><input id="regEmail" required></div>
        <div class="field"><label>Contact</label><input id="regContact" required></div>
        <div class="field"><label>Address</label><input id="regAddress" required></div>

        <div class="field-row">
          <div class="field"><label>Password</label><input type="password" id="regPw" required></div>
          <div class="field"><label>Confirm</label><input type="password" id="regPwConfirm" required></div>
        </div>

        <button class="submit-btn">Create Account</button>
      </form>
    </div>

  </div>
</div>

<script type="module">
import { supabase } from './supabase-client.js';

function switchPanel(id){
  document.querySelectorAll('.form-panel').forEach(p=>p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function toggleSupFields(){
  const role=document.querySelector('input[name="role"]:checked').value;
  const el=document.getElementById('supFields');
  if(el) el.style.display = role==='supplier'?'block':'none';
}

window.switchPanel=switchPanel;
window.toggleSupFields=toggleSupFields;
</script>

</body>
</html>
