<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – COSTruct</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,700&display=swap" rel="stylesheet">

<style>
:root{
--g900:#052016;--g800:#0a3d2b;--g600:#0f5a3f;--g400:#1a8a5e;
--g200:#a8dfc7;--g100:#d4f0e3;--g50:#edf8f3;
--ink:#111816;--ink3:#6b7a72;--bg:#f2f5f3;--border:#dde8e2;
}

*{margin:0;padding:0;box-sizing:border-box}
body{
font-family:'Plus Jakarta Sans',sans-serif;
background:var(--bg);
min-height:100vh;
display:flex;
align-items:center;
justify-content:center;
padding:20px;
}

.wrap{
display:grid;
grid-template-columns:1fr 1.4fr;
max-width:920px;
width:100%;
background:#fff;
border-radius:24px;
overflow:hidden;
box-shadow:0 20px 60px rgba(10,61,43,0.14);
}

.left{
background:var(--g900);
padding:52px 44px;
color:#fff;
position:relative;
}

.logo{
font-family:'Fraunces',serif;
font-size:26px;
font-weight:700;
}

.logo span{color:var(--g200)}

.right{
padding:48px 44px;
display:flex;
flex-direction:column;
justify-content:center;
}

.form-panel{display:none}
.form-panel.active{display:block}

.form-title{
font-family:'Fraunces',serif;
font-size:26px;
margin-bottom:6px;
}

.form-sub{color:var(--ink3);margin-bottom:20px}

.alert{
padding:10px;
border-radius:8px;
font-size:13px;
margin-bottom:10px;
display:none;
}

.alert.success{background:#d4edda}
.alert.error{background:#f8d7da}

.field{margin-bottom:14px}

.field input,select{
width:100%;
padding:12px;
border:1px solid var(--border);
border-radius:8px;
}

.role-row{display:flex;gap:10px;margin-bottom:15px}

.role-opt label{
border:1px solid var(--border);
padding:8px 12px;
border-radius:8px;
cursor:pointer;
}

.role-opt input{display:none}

.role-opt input:checked + label{
background:var(--g50);
border-color:var(--g600);
}

.submit-btn{
width:100%;
padding:12px;
background:var(--g800);
color:#fff;
border:none;
border-radius:8px;
cursor:pointer;
font-weight:700;
}

.submit-btn:hover{background:var(--g600)}

.switch-txt{text-align:center;margin-top:12px;font-size:13px}
.switch-txt a{color:var(--g600);cursor:pointer}
</style>
</head>

<body>

<div class="wrap">

<!-- LEFT -->
<div class="left">
  <div class="logo">CO<span>S</span>Truct</div>
  <p style="margin-top:20px;opacity:0.7">
    Build smarter. Estimate faster.
  </p>
</div>

<!-- RIGHT -->
<div class="right">

<!-- LOGIN -->
<div class="form-panel active" id="panelLogin">
<h2 class="form-title">Welcome back</h2>
<p class="form-sub">Sign in to continue</p>

<div class="alert" id="loginAlert"></div>

<form onsubmit="doLogin(event)">

<div class="role-row">
<div class="role-opt">
<input type="radio" name="loginRole" id="lrBuyer" value="buyer" checked>
<label for="lrBuyer">Buyer</label>
</div>

<div class="role-opt">
<input type="radio" name="loginRole" id="lrSupplier" value="supplier">
<label for="lrSupplier">Supplier</label>
</div>
</div>

<div class="field">
<input type="email" id="loginEmail" placeholder="Email" required>
</div>

<div class="field">
<input type="password" id="loginPw" placeholder="Password" required>
</div>

<button class="submit-btn">Login</button>

<p class="switch-txt">
No account? <a onclick="switchPanel('panelReg')">Register</a>
</p>

</form>
</div>

<!-- REGISTER -->
<div class="form-panel" id="panelReg">
<h2 class="form-title">Create account</h2>
<p class="form-sub">Register your account</p>

<div class="alert" id="regAlert"></div>

<form onsubmit="doRegister(event)">

<div class="role-row">
<div class="role-opt">
<input type="radio" name="role" id="rrBuyer" value="buyer" checked onchange="toggleSup()">
<label for="rrBuyer">Buyer</label>
</div>

<div class="role-opt">
<input type="radio" name="role" id="rrSupplier" value="supplier" onchange="toggleSup()">
<label for="rrSupplier">Supplier</label>
</div>
</div>

<div class="field"><input id="regName" placeholder="Full name" required></div>
<div class="field"><input id="regEmail" placeholder="Email" required></div>
<div class="field"><input id="regContact" placeholder="Contact" required></div>
<div class="field"><input id="regAddress" placeholder="Address" required></div>

<div class="field"><input type="password" id="regPw" placeholder="Password" required></div>
<div class="field"><input type="password" id="regPwConfirm" placeholder="Confirm Password" required></div>

<div id="supFields" style="display:none">
<div class="field"><input id="storeName" placeholder="Business Name"></div>
</div>

<button class="submit-btn">Register</button>

<p class="switch-txt">
Already have account? <a onclick="switchPanel('panelLogin')">Login</a>
</p>

</form>
</div>

</div>
</div>

<script type="module">
import { supabase } from './supabase-client.js';

function alert(id,msg,type){
const el=document.getElementById(id);
el.textContent=msg;
el.className=`alert ${type}`;
el.style.display='block';
setTimeout(()=>el.style.display='none',4000);
}

function switchPanel(id){
document.querySelectorAll('.form-panel').forEach(p=>p.classList.remove('active'));
document.getElementById(id).classList.add('active');
}

function toggleSup(){
const role=document.querySelector('input[name="role"]:checked').value;
document.getElementById('supFields').style.display =
role==='supplier' ? 'block':'none';
}

// ================= LOGIN =================
async function doLogin(e){
e.preventDefault();

const email=document.getElementById('loginEmail').value;
const pw=document.getElementById('loginPw').value;
const expected=document.querySelector('input[name="loginRole"]:checked').value;

const {data,error}=await supabase.auth.signInWithPassword({
email,password:pw
});

if(error) return alert('loginAlert',error.message,'error');

const {data:profile}=await supabase
.from('profiles')
.select('role')
.eq('id',data.user.id)
.maybeSingle();

const role=profile?.role || data.user.user_metadata?.role || 'buyer';

if(role!==expected){
await supabase.auth.signOut();
return alert('loginAlert','Role mismatch','error');
}

await ensureProfile(data.user);

alert('loginAlert','Login success','success');

setTimeout(()=>{
location.href=role==='supplier'?'admin.html':'index.html';
},1000);
}

// ================= REGISTER =================
async function doRegister(e){
e.preventDefault();

const name=document.getElementById('regName').value;
const email=document.getElementById('regEmail').value;
const contact=document.getElementById('regContact').value;
const address=document.getElementById('regAddress').value;
const pw=document.getElementById('regPw').value;
const pw2=document.getElementById('regPwConfirm').value;
const role=document.querySelector('input[name="role"]:checked').value;

if(pw!==pw2)
return alert('regAlert','Password mismatch','error');

const storeName=document.getElementById('storeName')?.value || null;

const {data,error}=await supabase.auth.signUp({
email,
password:pw,
options:{
data:{name,role,contact,address,storeName}
}
});

if(error) return alert('regAlert',error.message,'error');

alert('regAlert','Check email to confirm','success');

switchPanel('panelLogin');
}

// ================= PROFILE =================
async function ensureProfile(user){

const meta=user.user_metadata;

const {data}=await supabase
.from('profiles')
.select('id')
.eq('id',user.id)
.maybeSingle();

if(!data){
await supabase.from('profiles').insert({
id:user.id,
name:meta.name,
role:meta.role,
contact:meta.contact,
address:meta.address
});
}

if(meta.role==='supplier'){
await supabase.from('suppliers').upsert({
user_id:user.id,
name:meta.storeName,
owner_name:meta.name,
email:user.email
});
}
}

window.switchPanel=switchPanel;
window.toggleSup=toggleSup;
window.doLogin=doLogin;
window.doRegister=doRegister;

</script>
</body>
</html>
