<script type="module">
import { supabase } from './supabase-client.js';

function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'alert ' + type;
  el.style.display = 'block';
  setTimeout(() => el.style.display = 'none', 4000);
}

function switchPanel(id) {
  document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function toggleSupFields() {
  const role = document.querySelector('input[name="role"]:checked').value;
  document.getElementById('supFields').style.display =
    role === 'supplier' ? 'block' : 'none';
}

// ---------- LOGIN ----------
async function doLogin(e) {
  e.preventDefault();

  const email = document.getElementById('loginEmail').value.trim();
  const pw = document.getElementById('loginPw').value;
  const expectedRole = document.querySelector('input[name="loginRole"]:checked').value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password: pw
  });

  if (error) {
    showAlert('loginAlert', error.message, 'error');
    return;
  }

  const user = data.user;

  const { data: profile } = await supabase
    .from('profiles')
    .select('role')
    .eq('id', user.id)
    .maybeSingle();

  const actualRole =
    profile?.role || user.user_metadata?.role || 'buyer';

  if (actualRole !== expectedRole) {
    await supabase.auth.signOut();
    showAlert('loginAlert',
      `This account is registered as ${actualRole}.`,
      'error'
    );
    return;
  }

  showAlert('loginAlert', 'Login successful!', 'success');

  setTimeout(() => {
    location.href = actualRole === 'supplier'
      ? 'admin.html'
      : 'index.html';
  }, 1000);
}

// ---------- REGISTER ----------
async function doRegister(e) {
  e.preventDefault();

  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const contact = document.getElementById('regContact').value.trim();
  const address = document.getElementById('regAddress').value.trim();
  const pw = document.getElementById('regPw').value;
  const pw2 = document.getElementById('regPwConfirm').value;
  const role = document.querySelector('input[name="role"]:checked').value;

  if (!name || !email || !contact || !address || !pw || !pw2)
    return showAlert('regAlert', 'Fill all fields', 'error');

  if (pw !== pw2)
    return showAlert('regAlert', 'Passwords do not match', 'error');

  let storeName = null;
  let cat = null;
  let loc = null;

  if (role === 'supplier') {
    storeName = document.getElementById('storeName').value.trim();
    cat = document.getElementById('storeCategory').value;
    loc = document.getElementById('storeLoc').value;

    if (!storeName)
      return showAlert('regAlert', 'Enter business name', 'error');
  }

  const { data, error } = await supabase.auth.signUp({
    email,
    password: pw,
    options: {
      data: { name, role, contact, address, storeName, cat, loc }
    }
  });

  if (error) {
    return showAlert('regAlert', error.message, 'error');
  }

  const user = data.user;

  if (!user) {
    return showAlert(
      'regAlert',
      'Check your email to confirm registration.',
      'success'
    );
  }

  // PROFILE
  await supabase.from('profiles').upsert({
    id: user.id,
    name,
    role,
    contact,
    address
  });

  // SUPPLIER
  if (role === 'supplier') {
    await supabase.from('suppliers').upsert({
      user_id: user.id,
      email,
      name: storeName,
      owner_name: name,
      category: cat,
      location: loc,
      contact,
      address
    });
  }

  showAlert('regAlert',
    'Account created! Check email if confirmation is enabled.',
    'success'
  );

  switchPanel('panelLogin');
}

// expose
window.switchPanel = switchPanel;
window.toggleSupFields = toggleSupFields;
window.doLogin = doLogin;
window.doRegister = doRegister;

</script>
