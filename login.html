<script type="module">
import { supabase } from './supabase-client.js';

// ---------------- UI HELPERS ----------------
function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'alert ' + type;
  el.style.display = 'block';
  setTimeout(() => (el.style.display = 'none'), 5000);
}

function switchPanel(id) {
  document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function toggleSupFields() {
  const role = document.querySelector('input[name="role"]:checked').value;
  document.getElementById('supFields').style.display = role === 'supplier' ? 'block' : 'none';
}

// ---------------- CREATE PROFILE + SUPPLIER ----------------
async function ensureProfileAndSupplier(user) {

  // PROFILE CHECK
  const { data: existingProfile } = await supabase
    .from('profiles')
    .select('id, role')
    .eq('id', user.id)
    .maybeSingle();

  if (!existingProfile) {
    await supabase.from('profiles').insert({
      id: user.id,
      name: user.user_metadata?.name || '',
      role: user.user_metadata?.role || 'buyer',
      contact: user.user_metadata?.contact || '',
      address: user.user_metadata?.address || ''
    });
  }

  // SUPPLIER CHECK
  const role = user.user_metadata?.role || 'buyer';

  if (role === 'supplier') {
    const { data: exists } = await supabase
      .from('suppliers')
      .select('user_id')
      .eq('user_id', user.id)
      .maybeSingle();

    if (!exists) {
      const { error } = await supabase.from('suppliers').insert({
        user_id: user.id,
        email: user.email,
        name: user.user_metadata?.storeName || user.user_metadata?.name || "New Supplier",
        owner_name: user.user_metadata?.name || "",
        category: user.user_metadata?.category || "hardware",
        location: user.user_metadata?.location || "Unknown",
        contact: user.user_metadata?.contact || "",
        address: user.user_metadata?.address || "",
        since: new Date().getFullYear().toString(),
        delivery: "Available",
        rating: 0
      });

      if (error) {
        console.error("Supplier insert error:", error);
      }
    }
  }
}

// ---------------- LOGIN ----------------
async function doLogin(e) {
  e.preventDefault();

  const email = document.getElementById('loginEmail').value;
  const pw = document.getElementById('loginPw').value;
  const expectedRole = document.querySelector('input[name="loginRole"]:checked').value;

  const { data, error } = await supabase.auth.signInWithPassword({
    email,
    password: pw
  });

  if (error) {
    showAlert('loginAlert', error.message, 'error');
    return;
  }

  const user = data.user;

  // ROLE CHECK
  const actualRole = user.user_metadata?.role || 'buyer';

  if (actualRole !== expectedRole) {
    await supabase.auth.signOut();
    showAlert('loginAlert', `This account is a ${actualRole}, not a ${expectedRole}.`, 'error');
    return;
  }

  // ENSURE DB RECORDS
  await ensureProfileAndSupplier(user);

  showAlert('loginAlert', 'Login successful! Redirecting...', 'success');

  setTimeout(() => {
    location.href = actualRole === 'supplier' ? 'admin.html' : 'index.html';
  }, 1000);
}

// ---------------- REGISTER ----------------
async function doRegister(e) {
  e.preventDefault();

  const name = document.getElementById('regName').value;
  const email = document.getElementById('regEmail').value;
  const contact = document.getElementById('regContact').value;
  const address = document.getElementById('regAddress').value;
  const pw = document.getElementById('regPw').value;
  const pw2 = document.getElementById('regPwConfirm').value;
  const role = document.querySelector('input[name="role"]:checked').value;

  let storeName = null, cat = null, loc = null;

  if (role === 'supplier') {
    storeName = document.getElementById('storeName').value;
    cat = document.getElementById('storeCategory').value;
    loc = document.getElementById('storeLoc').value;
  }

  if (pw !== pw2) {
    showAlert('regAlert', 'Passwords do not match', 'error');
    return;
  }

  // SIGNUP + STORE EVERYTHING IN user_metadata
  const { data, error } = await supabase.auth.signUp({
    email,
    password: pw,
    options: {
      data: {
        name,
        role,
        contact,
        address,
        storeName,
        category: cat,
        location: loc
      }
    }
  });

  if (error) {
    showAlert('regAlert', error.message, 'error');
    return;
  }

  showAlert(
    'regAlert',
    'Account created! Please check your email or log in.',
    'success'
  );

  setTimeout(() => switchPanel('panelLogin'), 2000);
}

// ---------------- GLOBAL ----------------
window.doLogin = doLogin;
window.doRegister = doRegister;
window.switchPanel = switchPanel;
window.toggleSupFields = toggleSupFields;

</script>
