<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login – COSTruct</title>

<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&family=Fraunces:opsz,wght@9..144,700&display=swap" rel="stylesheet">

<style>:root{--g900:#052016;--g800:#0a3d2b;--g600:#0f5a3f;--g400:#1a8a5e;--g200:#a8dfc7;--g100:#d4f0e3;--g50:#edf8f3;--ink:#111816;--ink2:#3a4a42;--ink3:#6b7a72;--bg:#f2f5f3;--border:#dde8e2;--red:#dc3545}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px}
.wrap{display:grid;grid-template-columns:1fr 1.4fr;max-width:920px;width:100%;background:#fff;border-radius:24px;overflow:hidden;box-shadow:0 20px 60px rgba(10,61,43,0.14)}

/* LEFT PANEL */
.left{background:var(--g900);padding:52px 44px;display:flex;flex-direction:column;justify-content:space-between;position:relative;overflow:hidden}
.left-bg{position:absolute;bottom:-60px;right:-60px;width:280px;height:280px;border-radius:50%;background:rgba(15,90,63,0.35);pointer-events:none}
.left-bg2{position:absolute;top:-40px;left:-40px;width:180px;height:180px;border-radius:50%;background:rgba(15,90,63,0.2);pointer-events:none}
.logo{font-family:'Fraunces',serif;font-size:26px;font-weight:700;color:#fff;position:relative;z-index:1}
.logo span{color:var(--g200)}
.left-mid{position:relative;z-index:1}
.left h2{font-family:'Fraunces',serif;font-size:clamp(24px,3vw,32px);color:#fff;font-weight:700;line-height:1.2;margin-bottom:14px;letter-spacing:-0.5px}
.left h2 em{font-style:normal;color:var(--g200)}
.left p{font-size:14px;color:rgba(255,255,255,0.55);line-height:1.65}
.left-foot{position:relative;z-index:1}
.left-foot a{color:var(--g200);font-size:13px;text-decoration:none}

/* RIGHT PANEL */
.right{padding:48px 44px;display:flex;flex-direction:column;justify-content:center}
.panel-wrap{position:relative}
.form-panel{display:none}
.form-panel.active{display:block}
.form-title{font-family:'Fraunces',serif;font-size:26px;font-weight:700;color:var(--g900);margin-bottom:6px;letter-spacing:-0.3px}
.form-sub{font-size:14px;color:var(--ink3);margin-bottom:28px}
.alert{padding:11px 14px;border-radius:10px;font-size:13px;font-weight:500;margin-bottom:18px;display:none}
.alert.success{background:#d4edda;color:#155724;border:1px solid #c3e6cb}
.alert.error{background:#fde8e8;color:#7b2424;border:1px solid #f5c6cb}

/* ROLE SELECT */
.role-row{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px}
.role-opt input{display:none}
.role-opt label{display:flex;align-items:center;justify-content:center;gap:8px;padding:11px;border:1.5px solid var(--border);border-radius:10px;cursor:pointer;font-size:14px;font-weight:600;color:var(--ink3);transition:.2s}
.role-opt input:checked + label{border-color:var(--g600);background:var(--g50);color:var(--g800)}

/* INPUTS */
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:700;color:var(--ink3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:6px}
.field input,.field select{width:100%;padding:12px 14px;border:1.5px solid var(--border);border-radius:10px;font-family:inherit;font-size:15px;color:var(--ink);background:#fff;transition:.2s;outline:none}
.field input:focus,.field select:focus{border-color:var(--g600);box-shadow:0 0 0 3px rgba(15,90,63,0.1)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.divider{border:none;border-top:1px solid var(--border);margin:18px 0}
.supplier-fields{border:1.5px solid var(--border);border-radius:12px;padding:16px;background:var(--bg);margin-bottom:16px}
.supplier-fields-label{font-size:12px;font-weight:700;color:var(--ink3);letter-spacing:.5px;text-transform:uppercase;margin-bottom:12px}




.submit-btn{width:100%;padding:14px;background:var(--g800);color:#fff;border:none;border-radius:10px;font-family:inherit;font-size:16px;font-weight:700;cursor:pointer;transition:.2s;margin-top:6px}
.submit-btn:hover{background:var(--g600)}
.switch-txt{text-align:center;font-size:14px;color:var(--ink3);margin-top:18px}
.switch-txt a{color:var(--g600);font-weight:600;text-decoration:none}
.switch-txt a:hover{text-decoration:underline}

@media(max-width:680px){
  .wrap{grid-template-columns:1fr}
  .left{padding:36px 28px;min-height:auto}
  .left-mid,.left-foot{display:none}
  .right{padding:36px 28px}
  .field-row{grid-template-columns:1fr}
  .logo{font-size:22px}
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:#f2f5f3;display:flex;align-items:center;justify-content:center;height:100vh}
.wrap{display:grid;grid-template-columns:1fr 1.4fr;max-width:900px;width:100%;background:#fff;border-radius:20px;overflow:hidden}
.left{background:#052016;color:#fff;padding:40px}
.right{padding:40px}
.form-panel{display:none}
.form-panel.active{display:block}
.alert{padding:10px;margin-bottom:10px;display:none}
.alert.success{background:#d4edda}
.alert.error{background:#fde8e8}
</style>
</head>

<body>

<div class="wrap">

  <div class="left">
    <h2>COSTruct</h2>
    <p>Plan Fast. Build Smart.</p>
  </div>

  <div class="right">

    <!-- LOGIN -->
    <div class="form-panel active" id="panelLogin">
      <h2>Login</h2>
      <div id="loginAlert" class="alert"></div>

      <form id="loginForm">
        <input id="loginEmail" placeholder="Email"><br><br>
        <input id="loginPw" type="password" placeholder="Password"><br><br>
        <button type="submit">Login</button>
      </form>

      <p>No account? <a href="#" id="goRegister">Register here</a></p>
    </div>

    <!-- REGISTER -->
    <div class="form-panel" id="panelReg">
      <h2>Register</h2>
      <div id="regAlert" class="alert"></div>

      <form id="registerForm">
        <input id="regName" placeholder="Name"><br><br>
        <input id="regEmail" placeholder="Email"><br><br>
        <input id="regPw" type="password" placeholder="Password"><br><br>

        <select id="role">
          <option value="buyer">Buyer</option>
          <option value="supplier">Supplier</option>
        </select><br><br>

        <input id="storeName" placeholder="Business Name (supplier only)"><br><br>

        <button type="submit">Create Account</button>
      </form>

      <p>Already have account? <a href="#" id="goLogin">Login</a></p>
    </div>

  </div>
</div>

<script type="module">
import { supabase } from './supabase-client.js';

// ================= UI =================
function showAlert(id, msg, type) {
  const el = document.getElementById(id);
  el.textContent = msg;
  el.className = 'alert ' + type;
  el.style.display = 'block';
}

function switchPanel(id) {
  document.querySelectorAll('.form-panel').forEach(p => p.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

// FIXED: event listeners (no inline onclick)
document.getElementById('goRegister').addEventListener('click', (e) => {
  e.preventDefault();
  switchPanel('panelReg');
});

document.getElementById('goLogin').addEventListener('click', (e) => {
  e.preventDefault();
  switchPanel('panelLogin');
});

// ================= LOGIN =================
document.getElementById('loginForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const email = document.getElementById('loginEmail').value;
  const pw = document.getElementById('loginPw').value;

  const { error } = await supabase.auth.signInWithPassword({
    email,
    password: pw
  });

  if (error) {
    showAlert('loginAlert', error.message, 'error');
    return;
  }

  showAlert('loginAlert', 'Login success!', 'success');

  setTimeout(() => {
    location.href = 'index.html';
  }, 1000);
});

// ================= REGISTER =================
document.getElementById('registerForm').addEventListener('submit', async (e) => {
  e.preventDefault();

  const name = document.getElementById('regName').value.trim();
  const email = document.getElementById('regEmail').value.trim();
  const pw = document.getElementById('regPw').value;
  const role = document.getElementById('role').value;
  const storeName = document.getElementById('storeName').value.trim();

  if (!name || !email || !pw) {
    showAlert('regAlert', 'Fill all fields', 'error');
    return;
  }

  if (role === 'supplier' && !storeName) {
    showAlert('regAlert', 'Enter business name', 'error');
    return;
  }

  const { error } = await supabase.auth.signUp({
    email,
    password: pw,
    options: {
      data: {
        name,
        role,
        store_name: storeName
      }
    }
  });

  if (error) {
    showAlert('regAlert', error.message, 'error');
    return;
  }

  showAlert('regAlert', 'Account created! Please login.', 'success');

  setTimeout(() => {
    switchPanel('panelLogin');
  }, 1200);
});
</script>

</body>
</html>
